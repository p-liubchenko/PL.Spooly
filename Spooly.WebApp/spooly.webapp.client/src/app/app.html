<ng-container *ngIf="auth.isLoggedIn(); else noNav">
  <div class="shell">
    <nav class="sidebar">
      <div class="sidebar-brand">Spooly</div>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Dashboard</a>
      <a *ngIf="auth.hasPermission('printers.view')"      routerLink="/printers"     routerLinkActive="active">Printers</a>
      <a *ngIf="auth.hasPermission('materials.view')"     routerLink="/materials"    routerLinkActive="active">Materials</a>
      <a *ngIf="auth.hasPermission('currencies.view')"    routerLink="/currencies"   routerLinkActive="active">Currencies</a>
      <a *ngIf="auth.hasPermission('transactions.view')"  routerLink="/transactions" routerLinkActive="active">Transactions</a>
      <a *ngIf="auth.hasPermission('settings.view')"      routerLink="/settings"     routerLinkActive="active">Settings</a>
      <a *ngIf="auth.hasPermission('users.manage')"       routerLink="/users"        routerLinkActive="active">Users</a>
      <a *ngIf="auth.hasPermission('roles.manage')"       routerLink="/roles"        routerLinkActive="active">Roles</a>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-user">{{ auth.getUsername() }}</div>
      <a routerLink="/profile" class="sidebar-link-sm" routerLinkActive="active">Profile</a>
      <button class="btn-logout" (click)="logout()">Sign out</button>
    </nav>
    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>

  <button
    *ngIf="auth.hasPermission('transactions.manage')"
    class="fab"
    (click)="openQuickRecord()"
    title="Record print"
  >+</button>

  <app-quick-record (saved)="onPrintSaved()"></app-quick-record>
</ng-container>

<ng-template #noNav>
  <router-outlet></router-outlet>
</ng-template>
