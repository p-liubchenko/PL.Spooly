<div class="login-wrap">
  <div class="login-card">
    <h1 class="login-title">PL.PrintPrice</h1>
    <h2>{{ isForced ? 'Set your new password' : 'Change password' }}</h2>

    <p class="onboarding-hint" *ngIf="isForced">
      Your account was created with a temporary password. Please set a permanent password to continue.
    </p>

    <form (ngSubmit)="submit()" #f="ngForm">
      <div class="field" *ngIf="!isForced">
        <label>Current password</label>
        <input type="password" [(ngModel)]="currentPassword" name="current" required autocomplete="current-password" />
      </div>
      <div class="field">
        <label>New password</label>
        <input type="password" [(ngModel)]="newPassword" name="newpw" required minlength="6" autocomplete="new-password" />
      </div>
      <div class="field">
        <label>Confirm new password</label>
        <input type="password" [(ngModel)]="confirmPassword" name="confirm" required autocomplete="new-password"
               [class.field-error]="passwordMismatch" />
        <span class="field-hint error" *ngIf="passwordMismatch">Passwords do not match.</span>
      </div>

      <div class="error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading || !f.valid || passwordMismatch">
        {{ loading ? 'Saving…' : 'Set new password' }}
      </button>
    </form>
  </div>
</div>
