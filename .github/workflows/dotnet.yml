name: .NET

on:
  push:
    branches: ["master"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release -p:VersionSuffix=build.${{ github.run_number }}

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  publish:
    name: Publish & Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Extract version number
        id: ver
        run: echo "num=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Publish win-x64
        run: |
          dotnet publish Spooly.Cli/Spooly.Cli.csproj \
            -c Release -r win-x64 --self-contained \
            -p:PublishSingleFile=true \
            -p:VersionPrefix=${{ steps.ver.outputs.num }} \
            -o out/win-x64

      - name: Publish linux-x64
        run: |
          dotnet publish Spooly.Cli/Spooly.Cli.csproj \
            -c Release -r linux-x64 --self-contained \
            -p:PublishSingleFile=true \
            -p:VersionPrefix=${{ steps.ver.outputs.num }} \
            -o out/linux-x64

      - name: Publish osx-x64
        run: |
          dotnet publish Spooly.Cli/Spooly.Cli.csproj \
            -c Release -r osx-x64 --self-contained \
            -p:PublishSingleFile=true \
            -p:VersionPrefix=${{ steps.ver.outputs.num }} \
            -o out/osx-x64

      - name: Package
        run: |
          ( cd out/win-x64   && zip    "$GITHUB_WORKSPACE/spooly-win-x64-${GITHUB_REF_NAME}.zip"        Spooly.Cli.exe )
          ( cd out/linux-x64 && tar czf "$GITHUB_WORKSPACE/spooly-linux-x64-${GITHUB_REF_NAME}.tar.gz"  Spooly.Cli     )
          ( cd out/osx-x64   && tar czf "$GITHUB_WORKSPACE/spooly-osx-x64-${GITHUB_REF_NAME}.tar.gz"    Spooly.Cli     )

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            spooly-win-x64-${{ github.ref_name }}.zip
            spooly-linux-x64-${{ github.ref_name }}.tar.gz
            spooly-osx-x64-${{ github.ref_name }}.tar.gz
