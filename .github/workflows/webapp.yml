name: Web App CI

on:
  push:
    branches: ["master"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["master"]

jobs:
  # ── Build & test ───────────────────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Spooly.WebApp/spooly.webapp.client/package-lock.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: npm install (Angular client)
        working-directory: Spooly.WebApp/spooly.webapp.client
        run: npm ci --ignore-scripts

      - name: Build Angular
        working-directory: Spooly.WebApp/spooly.webapp.client
        run: npm run build

      - name: Restore .NET
        run: dotnet restore Spooly.WebApp/Spooly.WebApp.Server/Spooly.WebApp.Server.csproj /p:BuildNodeProject=false

      - name: Build .NET
        run: dotnet build Spooly.WebApp/Spooly.WebApp.Server/Spooly.WebApp.Server.csproj --no-restore -c Release /p:BuildNodeProject=false

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal /p:BuildNodeProject=false

  # ── Docker image ───────────────────────────────────────────────────────────
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # master → :latest, v1.2.3 tag → :1.2.3 and :1.2
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Spooly.WebApp/Spooly.WebApp.Server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
